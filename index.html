<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayanth ❤️ Sushma Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(#fffaf5, #fdf6ec);
  text-align: center;
  overflow-x: hidden;
}

/* Overlay */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #000, #222);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  cursor: pointer;
  transition: opacity 1s;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  letter-spacing: 2px;
}

.tag {
  font-family: 'Playfair Display';
  font-size: 16px;
  opacity: 0.8;
}

/* Image */
.full-img {
  width: 100%;
  display: block;
}

/* Section */
.section {
  padding: 60px 20px;
  animation: fadeUp 1.2s ease;
}

/* Cards */
.card {
  background: white;
  margin: 20px auto;
  padding: 25px;
  border-radius: 18px;
  max-width: 420px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  border: 1px solid #f0e4d7;
}

/* Headings */
h2 {
  font-family: 'Playfair Display';
  color: #8b0000;
}

/* Countdown */
.countdown {
  font-size: 28px;
  color: #b8860b;
  margin-top: 10px;
  font-weight: bold;
}

/* Button */
.btn {
  background: linear-gradient(45deg, #a52a2a, #d4af37);
  color: white;
  padding: 12px 22px;
  border-radius: 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 15px;
  font-weight: bold;
}

/* Animation */
@keyframes fadeUp {
  from {opacity: 0; transform: translateY(50px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Petals */
.petal {
  position: fixed;
  top: -20px;
  width: 12px;
  height: 12px;
  background: radial-gradient(circle, pink, #ffb6c1);
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<!-- OPEN SCREEN -->
<div id="overlay" onclick="openInvite()">
  <h1 class="names">Jayanth ❤️ Sushma</h1>
  <p class="tag">Together with their families invite you</p>
  <p>Tap to Open</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<!-- INVITATION IMAGE -->
<img src="invitation.png" class="full-img">

<!-- COUNTDOWN -->
<div class="section">
  <h2>Countdown to Our Wedding</h2>
  <div id="countdown" class="countdown"></div>
</div>

<!-- EVENTS -->
<div class="section">
  <h2>Wedding Events</h2>

  <div class="card">
    <h3>Reception</h3>
    <p>10 May 2026</p>
    <p>7:00 PM onwards</p>
  </div>

  <div class="card">
    <h3>Muhurtham</h3>
    <p>11 May 2026</p>
    <p>10:00 AM – 10:25 AM</p>
  </div>
</div>

<!-- VENUE -->
<div class="section">
  <h2>Venue</h2>
  <p>Kaveri Kalyan Mantapa</p>
  <p>Doddaballapur, Bengaluru Rural</p>

  <a class="btn" href="https://maps.google.com/?q=Kaveri Kalyan Mantapa" target="_blank">
    View Location
  </a>
</div>

<script>

// OPEN + MUSIC FADE
function openInvite() {
  let overlay = document.getElementById("overlay");
  overlay.style.opacity = "0";
  setTimeout(() => overlay.style.display = "none", 1000);

  let music = document.getElementById("music");
  music.volume = 0.2;
  music.play();
}

// COUNTDOWN
const weddingDate = new Date("May 11, 2026 10:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let gap = weddingDate - now;

  let d = Math.floor(gap / (1000 * 60 * 60 * 24));
  let h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    d + " Days " + h + " Hrs " + m + " Min";
}, 1000);

// PETALS
setInterval(() => {
  let p = document.createElement("div");
  p.className = "petal";
  p.style.left = Math.random() * window.innerWidth + "px";
  p.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(p);

  setTimeout(() => p.remove(), 8000);
}, 250);

</script>

</body>
</html>
