<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayanth ❤️ Sushma Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdf6ec;
  text-align: center;
  overflow-x: hidden;
}

/* Overlay */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  cursor: pointer;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 42px;
}

/* Image */
.full-img {
  width: 100%;
  display: block;
}

/* Sections */
.section {
  padding: 50px 20px;
}

/* Cards */
.card {
  background: white;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  animation: fadeUp 1s ease;
}

/* Countdown */
.countdown {
  font-size: 26px;
  color: #a52a2a;
  margin-top: 10px;
}

/* Button */
.btn {
  background: #a52a2a;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
  margin-top: 10px;
}

/* Animation */
@keyframes fadeUp {
  from {opacity: 0; transform: translateY(40px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Falling flowers */
.flower {
  position: fixed;
  top: -50px;
  width: 12px;
  height: 12px;
  background: pink;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- OPEN SCREEN -->
<div id="overlay" onclick="openInvite()">
  <h1 class="names">Jayanth ❤️ Sushma</h1>
  <p>Tap to Open Invitation</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<!-- INVITATION IMAGE -->
<img src="invitation.png" class="full-img">

<!-- COUNTDOWN -->
<div class="section">
  <h2>Countdown to Our Wedding</h2>
  <div id="countdown" class="countdown"></div>
</div>

<!-- EVENTS -->
<div class="section">
  <h2>Wedding Events</h2>

  <div class="card">
    <h3>Reception</h3>
    <p>10 May 2026</p>
    <p>7:00 PM onwards</p>
  </div>

  <div class="card">
    <h3>Muhurtham</h3>
    <p>11 May 2026</p>
    <p>10:00 AM – 10:25 AM</p>
  </div>
</div>

<!-- VENUE -->
<div class="section">
  <h2>Venue</h2>
  <p>Kaveri Kalyan Mantapa</p>
  <p>Doddaballapur, Bengaluru Rural</p>

  <a class="btn" href="https://maps.google.com/?q=Kaveri Kalyan Mantapa" target="_blank">
    View Location
  </a>
</div>

<script>

// OPEN INVITE + MUSIC
function openInvite() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("music").play();
}

// COUNTDOWN
const weddingDate = new Date("May 11, 2026 10:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let gap = weddingDate - now;

  let d = Math.floor(gap / (1000 * 60 * 60 * 24));
  let h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    d + " Days " + h + " Hrs " + m + " Min";
}, 1000);

// FLOWERS
setInterval(() => {
  let f = document.createElement("div");
  f.className = "flower";
  f.style.left = Math.random() * window.innerWidth + "px";
  f.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(f);

  setTimeout(() => f.remove(), 8000);
}, 300);

</script>

</body>
</html>
