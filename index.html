<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayanth ❤️ Sushma Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdf6ec;
  text-align: center;
}

/* Overlay */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  cursor: pointer;
}

/* Names */
.names {
  font-family: 'Great Vibes', cursive;
  font-size: 42px;
}

/* Image */
.full-img {
  width: 100%;
}

/* Section */
.section {
  padding: 50px 20px;
}

/* Cards */
.card {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

/* Countdown */
.countdown {
  font-size: 26px;
  color: #a52a2a;
}

/* Button */
.btn {
  background: #a52a2a;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  text-decoration: none;
  border: none;
}

/* Gallery */
.gallery img {
  width: 90%;
  margin: 10px;
  border-radius: 10px;
}

/* RSVP */
input, select {
  padding: 10px;
  margin: 10px;
  width: 80%;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Flower */
.flower {
  position: fixed;
  top: -50px;
  width: 15px;
  height: 15px;
  background: pink;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- OPEN SCREEN -->
<div id="overlay" onclick="openInvite()">
  <h1 class="names">Jayanth ❤️ Sushma</h1>
  <p>Tap to Enter</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<!-- IMAGE -->
<img src="invitation.png" class="full-img">

<!-- COUNTDOWN -->
<div class="section">
  <h2>Countdown</h2>
  <div id="countdown" class="countdown"></div>
</div>

<!-- EVENTS -->
<div class="section">
  <h2>Events</h2>

  <div class="card">
    <h3>Reception</h3>
    <p>10 May 2026 – 7 PM</p>
  </div>

  <div class="card">
    <h3>Muhurtham</h3>
    <p>11 May 2026 – 10 AM</p>
  </div>
</div>

<!-- GALLERY -->
<div class="section gallery">
  <h2>Our Moments</h2>
  <img src="invitation.png">
  <img src="invitation.png">
</div>

<!-- RSVP -->
<div class="section">
  <h2>RSVP</h2>

  <input type="text" placeholder="Your Name"><br>
  <select>
    <option>Will you attend?</option>
    <option>Yes</option>
    <option>No</option>
  </select><br>

  <button class="btn" onclick="submitRSVP()">Submit</button>
  <p id="msg"></p>
</div>

<!-- VENUE -->
<div class="section">
  <h2>Venue</h2>
  <p>Kaveri Kalyan Mantapa</p>

  <a class="btn" href="https://maps.google.com/?q=Kaveri Kalyan Mantapa" target="_blank">
    Open Map
  </a>
</div>

<script>

// OPEN
function openInvite() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("music").play();
}

// COUNTDOWN
const date = new Date("May 11, 2026 10:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let gap = date - now;

  let d = Math.floor(gap/(1000*60*60*24));
  let h = Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((gap%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
    d+" Days "+h+" Hrs "+m+" Min";
}, 1000);

// RSVP
function submitRSVP() {
  document.getElementById("msg").innerText = "Thank you! 💖";
}

// FLOWERS
setInterval(() => {
  let f = document.createElement("div");
  f.className = "flower";
  f.style.left = Math.random()*window.innerWidth + "px";
  f.style.animationDuration = (3 + Math.random()*5) + "s";
  document.body.appendChild(f);

  setTimeout(()=>f.remove(), 8000);
}, 300);

</script>

</body>
</html>
