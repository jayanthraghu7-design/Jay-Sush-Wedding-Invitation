<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayanth ❤️ Sushma Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#fdf6ec;
  text-align:center;
}

/* Overlay */
#overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  cursor:pointer;
}

.names {
  font-family:'Great Vibes';
  font-size:42px;
}

/* Sections */
.section {
  padding:50px 20px;
}

.card {
  background:white;
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.full-img {
  width:100%;
}

/* Countdown */
.countdown {
  font-size:26px;
  color:#a52a2a;
}

/* Button */
.btn {
  background:#a52a2a;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:8px;
}

/* Inputs */
input, select {
  padding:10px;
  width:80%;
  margin:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* Flowers */
.flower {
  position:fixed;
  top:-50px;
  width:15px;
  height:15px;
  background:pink;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall {
  to { transform:translateY(100vh); }
}
</style>
</head>

<body>

<!-- OPEN -->
<div id="overlay" onclick="openInvite()">
  <h1 class="names">Jayanth ❤️ Sushma</h1>
  <p>Tap to Enter</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<img src="invitation.png" class="full-img">

<!-- COUNTDOWN -->
<div class="section">
<h2>Countdown</h2>
<div id="countdown" class="countdown"></div>
</div>

<!-- EVENTS -->
<div class="section">
<h2>Events</h2>
<div class="card">Reception – 10 May 2026, 7 PM</div>
<div class="card">Muhurtham – 11 May 2026, 10 AM</div>
</div>

<!-- RSVP -->
<div class="section">
<h2>RSVP</h2>

<input type="text" id="name" placeholder="Your Name"><br>

<select id="attend">
<option value="Yes">Yes, I will attend</option>
<option value="No">Sorry, can't come</option>
</select><br>

<button class="btn" onclick="sendRSVP()">Submit</button>
<p id="msg"></p>

</div>

<script>

// OPEN
function openInvite() {
  document.getElementById("overlay").style.display="none";
  document.getElementById("music").play();
}

// COUNTDOWN
const date=new Date("May 11, 2026 10:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let gap=date-now;
let d=Math.floor(gap/(1000*60*60*24));
let h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((gap%(1000*60*60))/(1000*60));
document.getElementById("countdown").innerHTML=
d+" Days "+h+" Hrs "+m+" Min";
},1000);

// RSVP → GOOGLE FORM
function sendRSVP() {
let name=document.getElementById("name").value;
let attend=document.getElementById("attend").value;

/* 🔴 REPLACE BELOW WITH YOUR FORM LINK */
let url="https://docs.google.com/forms/d/e/XXXX/formResponse?entry.123456="+name+"&entry.654321="+attend;

fetch(url,{mode:"no-cors"});

document.getElementById("msg").innerHTML="Response saved 💖";
}

// FLOWERS
setInterval(()=>{
let f=document.createElement("div");
f.className="flower";
f.style.left=Math.random()*window.innerWidth+"px";
f.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(f);
setTimeout(()=>f.remove(),8000);
},300);

</script>

</body>
</html>
