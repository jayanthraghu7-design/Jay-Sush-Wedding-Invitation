<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayanth ❤️ Sushma Wedding</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #f8f3e8;
  text-align: center;
  color: #5a2d0c;
}

/* Opening Screen */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  cursor: pointer;
}

/* Hero Image */
.hero {
  background: url('invitation.png') no-repeat center/cover;
  height: 100vh;
}

/* Section */
.section {
  padding: 40px 20px;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Countdown */
.countdown {
  font-size: 24px;
  margin-top: 10px;
  color: #b8860b;
}

</style>
</head>

<body>

<!-- Opening -->
<div id="overlay" onclick="openInvite()">
  <h1>Jayanth ❤️ Sushma</h1>
  <p>Tap to Open Invitation</p>
</div>

<!-- Hero -->
<div class="hero"></div>

<!-- Countdown -->
<div class="section">
  <h2>Wedding Countdown</h2>
  <div id="countdown" class="countdown"></div>
</div>

<!-- Events -->
<div class="section">
  <h2>Events</h2>

  <div class="card">
    <h3>Reception</h3>
    <p>Saturday, 10 May 2026</p>
    <p>7 PM onwards</p>
  </div>

  <div class="card">
    <h3>Muhurtham</h3>
    <p>Monday, 11 May 2026</p>
    <p>10:00 AM – 10:25 AM</p>
  </div>
</div>

<!-- Venue -->
<div class="section">
  <h2>Venue</h2>
  <p>Kaveri Kalyan Mantapa</p>
  <p>Doddaballapur, Bengaluru Rural</p>

  <iframe 
    src="https://maps.google.com/maps?q=Kaveri%20Kalyan%20Mantapa&t=&z=13&ie=UTF8&iwloc=&output=embed"
    width="90%" height="300" style="border:0;">
  </iframe>
</div>

<script>

// Open animation
function openInvite() {
  document.getElementById("overlay").style.display = "none";
}

// Countdown
const weddingDate = new Date("May 11, 2026 10:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let gap = weddingDate - now;

  let days = Math.floor(gap / (1000 * 60 * 60 * 24));
  let hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let minutes = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m";
}, 1000);

</script>

</body>
</html>
