<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayanth ❤️ Sushma Wedding</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #f8f3e8;
  text-align: center;
  color: #5a2d0c;
}

/* Opening Screen */
#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  cursor: pointer;
}

/* FULL IMAGE FIX */
.full-img {
  width: 100%;
  height: auto;
  display: block;
}

/* Sections */
.section {
  padding: 40px 20px;
}

/* Cards */
.card {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Countdown */
.countdown {
  font-size: 24px;
  margin-top: 10px;
  color: #b8860b;
}

/* Button */
.btn {
  display: inline-block;
  padding: 12px 20px;
  background: #8b0000;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- OPEN SCREEN -->
<div id="overlay" onclick="openInvite()">
  <h1>Jayanth ❤️ Sushma</h1>
  <p>Tap to Open Invitation</p>
</div>

<!-- FULL INVITATION IMAGE -->
<img src="invitation.png" class="full-img">

<!-- COUNTDOWN -->
<div class="section">
  <h2>Countdown to Our Big Day</h2>
  <div id="countdown" class="countdown"></div>
</div>

<!-- EVENTS -->
<div class="section">
  <h2>Wedding Events</h2>

  <div class="card">
    <h3>Reception</h3>
    <p>Saturday, 10 May 2026</p>
    <p>7 PM onwards</p>
  </div>

  <div class="card">
    <h3>Muhurtham</h3>
    <p>Monday, 11 May 2026</p>
    <p>10:00 AM – 10:25 AM</p>
  </div>
</div>

<!-- VENUE -->
<div class="section">
  <h2>Venue</h2>
  <p>Kaveri Kalyan Mantapa</p>
  <p>Doddaballapur, Bengaluru Rural</p>

  <a class="btn" href="https://maps.google.com/?q=Kaveri Kalyan Mantapa" target="_blank">
    View on Map
  </a>
</div>

<script>
// OPEN INVITE
function openInvite() {
  document.getElementById("overlay").style.display = "none";
}

// COUNTDOWN
const weddingDate = new Date("May 11, 2026 10:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let gap = weddingDate - now;

  let days = Math.floor(gap / (1000 * 60 * 60 * 24));
  let hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  let minutes = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    days + " days " + hours + " hrs " + minutes + " mins";
}, 1000);
</script>

</body>
</html>
